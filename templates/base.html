<!doctype html>
<html lang="pt-br">
<head>
  <script>
    // Anti-FOUC: aplica o tema antes do CSS carregar
    (function(){
      try {
        var saved = localStorage.getItem('cockpit.theme');
        var t = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.dataset.theme = t;
      } catch(e) { document.documentElement.dataset.theme = 'dark'; }
    })();
    // Após DOM montar, ajusta src dos logos para o tema atual
    document.addEventListener('DOMContentLoaded', function(){
      var t = document.documentElement.dataset.theme;
      var next = t === 'light' ? 'piloto-cockpit-light.svg' : 'piloto-cockpit-darktheme.svg';
      document.querySelectorAll('.brand-logo img, .login-logo img').forEach(function(img){
        img.src = img.src.replace(/piloto-cockpit-(light|darktheme)\.svg/, next);
      });
    });
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Cockpit{% endblock %}</title>

  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16.png') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
  <link rel="icon" type="image/png" sizes="48x48" href="{{ url_for('static', filename='favicon-48.png') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='favicon-192.png') }}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='favicon-512.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon-180.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
  <meta name="theme-color" content="#1E3A8A">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
