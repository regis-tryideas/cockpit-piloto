{% extends "base.html" %}
{% block title %}Cockpit · Login{% endblock %}
{% block body %}
<div class="login-wrap">
  <form method="post" action="{{ url_for('login') }}" class="login-card">
    <h1>Cockpit</h1>
    <p class="subtitle">Monitor de recursos da máquina</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <label>
      <span>Usuário</span>
      <input type="text" name="username" value="root" autocomplete="username" required>
    </label>
    <label>
      <span>Senha</span>
      <input type="password" name="password" autocomplete="current-password" required autofocus>
    </label>
    <button type="submit">Entrar</button>
    <p class="hint">Autenticação via PAM contra o usuário <code>root</code> do sistema.</p>
  </form>
</div>
{% endblock %}
